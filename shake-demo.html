<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shake — Water Text</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f7f6f4;
  overflow: hidden;
  width: 100vw;
  height: 100svh;
  font-family: 'Georgia', serif;
}

canvas {
  display: block;
  position: fixed;
  inset: 0;
}

/* Permission button (iOS only) */
#permission-btn {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #f7f6f4;
  gap: 20px;
  z-index: 10;
}
#permission-btn p {
  font-size: 13px;
  color: #b0aba4;
  letter-spacing: .1em;
}
#permission-btn button {
  background: #1a1a1a;
  color: #f7f6f4;
  border: none;
  padding: 14px 36px;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  cursor: pointer;
}

#hint {
  position: fixed;
  bottom: 32px;
  left: 0; right: 0;
  text-align: center;
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: #b0aba4;
  pointer-events: none;
  transition: opacity .5s;
}
</style>
</head>
<body>

<div id="permission-btn" style="display:none;">
  <p>摇晃手机，让文字流动</p>
  <button id="allow-btn">允许访问动作传感器</button>
</div>

<canvas id="c"></canvas>
<div id="hint">摇一摇 · 倾斜试试</div>

<script>
// ── Config ────────────────────────────────────────────
const TEXT    = 'Serena Xie';
const FONT    = '700 42px Georgia, serif';
const COLOR   = '#1a1a1a';
const BG      = '#f7f6f4';
const WALL    = 60;        // wall thickness
const BOUNCE  = 0.55;
const FRICTION = 0.04;

// ── Canvas setup ──────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); rebuildWalls(); });

// ── Matter.js ─────────────────────────────────────────
const { Engine, Render, Runner, Bodies, Body, World, Events, Vector } = Matter;

const engine = Engine.create({ gravity: { x: 0, y: 1.2 } });
const world  = engine.world;

// ── Build letter bodies ───────────────────────────────
let letterBodies = [];

function measureLetters(text, font) {
  ctx.font = font;
  const letters = [];
  let x = 0;
  for (const ch of text) {
    const w = ctx.measureText(ch).width;
    letters.push({ ch, w, x });
    x += w;
  }
  return letters;
}

function createLetterBodies() {
  // Remove old
  World.remove(world, letterBodies);
  letterBodies = [];

  const letters = measureLetters(TEXT, FONT);
  const totalW  = letters.reduce((s, l) => s + l.w, 0);
  const startX  = (W - totalW) / 2;
  const startY  = H / 2;
  const fontSize = parseInt(FONT);

  for (const { ch, w, x } of letters) {
    if (ch === ' ') continue;
    const bw = Math.max(w, 14);
    const bh = fontSize * 0.85;
    const body = Bodies.rectangle(
      startX + x + w / 2,
      startY,
      bw * 0.82,
      bh,
      {
        restitution: BOUNCE,
        friction:    FRICTION,
        frictionAir: 0.018,
        label: ch,
        chamfer: { radius: 6 },
      }
    );
    body._char = ch;
    body._w    = bw;
    body._h    = bh;
    letterBodies.push(body);
  }
  World.add(world, letterBodies);
}

// ── Walls ─────────────────────────────────────────────
let walls = [];

function rebuildWalls() {
  World.remove(world, walls);
  const opts = { isStatic: true, restitution: 0.4, friction: 0.1 };
  walls = [
    Bodies.rectangle(W / 2, H + WALL / 2,     W + WALL * 2, WALL, opts), // floor
    Bodies.rectangle(W / 2, -WALL / 2,          W + WALL * 2, WALL, opts), // ceiling
    Bodies.rectangle(-WALL / 2,      H / 2, WALL, H + WALL * 2, opts), // left
    Bodies.rectangle(W + WALL / 2,  H / 2, WALL, H + WALL * 2, opts), // right
  ];
  World.add(world, walls);
}
rebuildWalls();

// ── Render loop ───────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  ctx.font    = FONT;
  ctx.fillStyle = COLOR;
  ctx.textBaseline = 'middle';
  ctx.textAlign    = 'center';

  for (const body of letterBodies) {
    const { x, y } = body.position;
    const angle    = body.angle;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillText(body._char, 0, 0);
    ctx.restore();
  }

  Engine.update(engine, 1000 / 60);
  requestAnimationFrame(draw);
}

// ── Shake detection ───────────────────────────────────
let lastAcc = { x: 0, y: 0, z: 0 };
let shakeTimeout;

function onMotion(e) {
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;

  const dx = Math.abs(acc.x - lastAcc.x);
  const dy = Math.abs(acc.y - lastAcc.y);
  const dz = Math.abs(acc.z - lastAcc.z);
  lastAcc = { x: acc.x, y: acc.y, z: acc.z };

  // Shake threshold
  if (dx + dy + dz > 18) {
    explode();
  }
}

function explode() {
  for (const body of letterBodies) {
    Body.applyForce(body, body.position, {
      x: (Math.random() - 0.5) * 0.18,
      y: (Math.random() - 0.5) * 0.18,
    });
    Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.4);
  }
  // Hide hint after first shake
  document.getElementById('hint').style.opacity = '0';
}

// ── Tilt → gravity direction ──────────────────────────
function onOrientation(e) {
  // gamma: left/right tilt (-90 to 90)
  // beta:  front/back tilt (-180 to 180)
  const gamma = e.gamma || 0;
  const beta  = e.beta  || 0;

  engine.gravity.x =  gamma / 45;          // tilt left/right
  engine.gravity.y =  Math.max(0.2, beta / 45); // tilt fwd/back (keep some downward pull)
}

// ── Desktop mouse shake simulation ────────────────────
let mouseDown = false;
let lastMouse = { x: 0, y: 0 };

window.addEventListener('mousedown', e => {
  mouseDown = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => { mouseDown = false; });
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  const speed = Math.sqrt(dx * dx + dy * dy);
  if (speed > 14) {
    for (const body of letterBodies) {
      Body.applyForce(body, body.position, {
        x: dx * 0.0004,
        y: dy * 0.0004,
      });
    }
    document.getElementById('hint').style.opacity = '0';
  }
  lastMouse = { x: e.clientX, y: e.clientY };
});

// Click/tap to explode on desktop
window.addEventListener('click', explode);

// ── iOS 13+ permission ────────────────────────────────
function startSensors() {
  window.addEventListener('devicemotion',      onMotion,      { passive: true });
  window.addEventListener('deviceorientation', onOrientation, { passive: true });
}

function init() {
  createLetterBodies();
  draw();

  // Check if we need permission (iOS 13+)
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    document.getElementById('permission-btn').style.display = 'flex';
    document.getElementById('allow-btn').addEventListener('click', () => {
      Promise.all([
        DeviceMotionEvent.requestPermission(),
        DeviceOrientationEvent.requestPermission?.() ?? Promise.resolve('granted'),
      ]).then(([ms]) => {
        if (ms === 'granted') {
          startSensors();
          document.getElementById('permission-btn').style.display = 'none';
        }
      });
    });
  } else {
    // Android / desktop — no permission needed
    startSensors();
  }
}

init();
</script>
</body>
</html>
